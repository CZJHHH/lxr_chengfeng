<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>一号训练室 · 白天</title>
    <style>
        /* ===== 全局风格（深色暖调复古梦幻） ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'PingFang SC', Roboto, 'Helvetica Neue', sans-serif;
            background: #1a1410;
            color: #f0e6d8;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .page {
            width: 100%;
            max-width: 560px;
            min-height: 700px;
            background: #2d231e;
            border-radius: 32px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8), inset 0 1px 0 rgba(255, 215, 170, 0.08);
            padding: 24px 20px 28px;
            border: 1px solid #4d3a30;
            display: flex;
            flex-direction: column;
            animation: fadeUp 0.5s ease-out;
            position: relative;
            overflow: hidden;
        }

        @keyframes fadeUp {
            0% {
                opacity: 0;
                transform: translateY(24px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 10px;
            border-bottom: 2px solid #5f4336;
            margin-bottom: 16px;
        }

        .page-header .id {
            font-size: 18px;
            font-weight: 700;
            color: #f5dcc8;
            letter-spacing: 2px;
        }

        .page-header .badge {
            font-size: 14px;
            font-weight: 400;
            background: #4d342b;
            padding: 2px 16px;
            border-radius: 40px;
            color: #c9b09d;
        }

        /* ===== 故事文本容器 ===== */
        .story-block {
            background: rgba(40, 28, 22, 0.7);
            border-radius: 18px;
            padding: 18px 20px;
            border-left: 4px solid #b8875e;
            backdrop-filter: blur(4px);
            box-shadow: inset 0 1px 0 rgba(255, 215, 170, 0.04);
            margin-bottom: 16px;
            flex-shrink: 0;
            min-height: 80px;
        }

        .line {
            font-size: 16px;
            line-height: 2;
            color: #e8d9cd;
            margin-bottom: 6px;
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.4s ease, transform 0.4s ease;
        }

        .line.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .line.empty {
            height: 0.8em;
            margin-bottom: 0;
        }

        .line .highlight {
            color: #fad5b0;
            font-weight: 600;
        }

        /* ===== 游戏区域（跳跃游戏） ===== */
        .game-section {
            background: rgba(40, 28, 22, 0.5);
            border-radius: 18px;
            padding: 16px 14px;
            margin-bottom: 14px;
            border: 1px solid #4d3a30;
            flex-shrink: 0;
            text-align: center;
        }

        .game-title {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 14px;
            color: #b0907a;
            margin-bottom: 10px;
            flex-wrap: wrap;
            gap: 6px;
        }

        .game-title .status {
            color: #dccbc0;
            font-weight: 500;
        }

        #gameCanvas {
            display: block;
            width: 100%;
            max-width: 480px;
            aspect-ratio: 800 / 400;
            margin: 0 auto;
            border-radius: 12px;
            background: #87CEEB;
            cursor: pointer;
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.08);
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }

        .game-controls {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 12px;
            flex-wrap: wrap;
        }

        .game-controls .btn-game {
            background: #4d342b;
            border: none;
            border-radius: 40px;
            color: #c9b09d;
            padding: 6px 20px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 3px 0 #2f221b;
            font-weight: 600;
        }

        .game-controls .btn-game:hover:not(:disabled) {
            background: #5f483c;
            transform: translateY(-2px);
            box-shadow: 0 5px 0 #2f221b;
        }

        .game-controls .btn-game:active:not(:disabled) {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #2f221b;
        }

        .game-controls .btn-game:disabled {
            opacity: 0.5;
            transform: translateY(2px);
            box-shadow: 0 1px 0 #2f221b;
            cursor: not-allowed;
        }

        .game-controls .btn-game.btn-success {
            background: #4ecdc4;
            color: #1f1f1f;
            box-shadow: 0 3px 0 #2a9d8f;
        }

        .game-controls .btn-game.btn-success:hover:not(:disabled) {
            background: #6ee0d7;
            box-shadow: 0 5px 0 #2a9d8f;
        }

        .game-controls .btn-game.btn-danger {
            background: #ff6b6b;
            color: #1f1f1f;
            box-shadow: 0 3px 0 #c0392b;
        }

        .game-controls .btn-game.btn-danger:hover:not(:disabled) {
            background: #ff8989;
            box-shadow: 0 5px 0 #c0392b;
        }

        .game-hint {
            font-size: 13px;
            color: #8a7668;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* ===== 游戏成功消息（永久保留） ===== */
        .game-message {
            background: rgba(40, 28, 22, 0.7);
            border-radius: 16px;
            padding: 14px 16px;
            margin-top: 12px;
            border: 1px solid #b8875e;
            display: none;
            font-size: 15px;
            line-height: 1.6;
            color: #fad5b0;
            text-align: center;
        }

        .game-message.show {
            display: block;
            animation: fadeUp 0.5s ease;
        }

        .game-message .highlight-msg {
            color: #ffd700;
            font-weight: 600;
        }

        /* ===== 前往按钮（永久保留） ===== */
        .btn-action {
            display: block;
            width: 100%;
            padding: 16px 20px;
            background: #7a5a47;
            border: none;
            border-radius: 40px;
            color: #f5ede5;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.25s;
            box-shadow: 0 6px 0 #4d342b, 0 8px 24px rgba(0, 0, 0, 0.4);
            text-align: center;
            letter-spacing: 3px;
            margin-top: 2px;
            user-select: none;
            touch-action: manipulation;
        }

        /* 初始隐藏按钮 */
        .btn-action.hidden {
            display: none;
        }

        .btn-action.enabled {
            opacity: 1;
            pointer-events: auto;
        }

        .btn-action:hover.enabled {
            transform: translateY(-3px);
            box-shadow: 0 8px 0 #4d342b, 0 12px 32px rgba(0, 0, 0, 0.5);
            background: #8d6a55;
        }

        .btn-action:active.enabled {
            transform: translateY(6px);
            box-shadow: 0 2px 0 #4d342b;
        }

        .btn-action .arrow {
            display: inline-block;
            margin-left: 10px;
            transition: transform 0.2s;
        }

        .btn-action:hover.enabled .arrow {
            transform: translateX(4px);
        }

        /* ===== 返回按钮 ===== */
        .btn-back {
            display: inline-block;
            padding: 8px 20px;
            background: #4d342b;
            border: none;
            border-radius: 40px;
            color: #c9b09d;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 3px 0 #2f221b;
            text-decoration: none;
            text-align: center;
            margin-top: 10px;
            opacity: 0.6;
            pointer-events: none;
        }

        .btn-back.enabled {
            opacity: 1;
            pointer-events: auto;
        }

        .btn-back.enabled:hover {
            background: #5f483c;
            transform: translateY(-2px);
            box-shadow: 0 5px 0 #2f221b;
        }

        .btn-back.enabled:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #2f221b;
        }

        .back-wrap {
            margin-top: 10px;
            text-align: center;
        }

        /* ===== 页脚 ===== */
        .footer {
            margin-top: auto;
            padding-top: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            color: #7a6558;
            border-top: 1px solid #3d2c23;
            flex-shrink: 0;
        }

        .footer .page-num {
            background: #2d1f1a;
            padding: 2px 16px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 500;
            color: #b0907a;
        }

        .footer .brand {
            letter-spacing: 1px;
            opacity: 0.7;
        }

        /* ===== Toast ===== */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #2d1f1a;
            padding: 12px 28px;
            border-radius: 40px;
            border: 1px solid #b8875e;
            color: #f5ede5;
            font-size: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
            z-index: 999;
            opacity: 0;
            transition: opacity 0.3s, transform 0.3s;
            pointer-events: none;
            max-width: 90%;
            text-align: center;
            backdrop-filter: blur(8px);
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* ===== 响应式 ===== */
        @media (max-width: 480px) {
            .page {
                padding: 18px 14px 22px;
                min-height: 600px;
                border-radius: 24px;
            }
            .page-header .id {
                font-size: 16px;
            }
            .line {
                font-size: 15px;
                line-height: 1.9;
            }
            .btn-action {
                font-size: 16px;
                padding: 14px 16px;
            }
            #gameCanvas {
                max-width: 100%;
            }
        }

        @media (max-width: 380px) {
            .line {
                font-size: 14px;
            }
            .game-title {
                font-size: 12px;
            }
            .game-controls .btn-game {
                padding: 4px 14px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>

    <!-- Toast -->
    <div id="toast" class="toast"></div>

    <div class="page" id="page-game1">

        <!-- 标题 -->
        <div class="page-header">
            <span class="id">🎮 一号训练室 · 白天</span>
            <span class="badge">4 / 7</span>
        </div>

        <!-- 故事内容（逐行显示） -->
        <div class="story-block" id="storyBlock">
            <div class="line">满屋子的游戏机！</div>
            <div class="line">角落里有一个 <span class="highlight">上锁的箱子</span>，需要四位密码。</div>
            <div class="line">先探索一下四周，寻找线索……</div>
            <div class="line empty"></div>
            <div class="line">咦？这台街机好像可以 <span class="highlight">玩</span>！</div>
            <div class="line">不如先来一局，或许能找到什么……</div>
        </div>

        <!-- 游戏区域（跳跃游戏） -->
        <div class="game-section">
            <div class="game-title">
                <span>🦕 跳跃闯关</span>
                <span class="status" id="gameStatus">点击「🚀 开始」出发</span>
            </div>
            <canvas id="gameCanvas" width="800" height="400"></canvas>
            <div class="game-controls">
                <button class="btn-game" id="btnGameStart">🚀 开始</button>
                <span class="game-hint" id="gameHint">👆 点击画面 / 空格跳跃</span>
            </div>
            <!-- 游戏成功消息（永久保留） -->
            <div id="gameMessage" class="game-message">
                🤔 结果什么密码也没有，可能答案不在这里...
                <br>🎮 玩了一会感觉有些累，还是出门走走吧，说不定外面有人在...
            </div>
        </div>

        <!-- 前往按钮（初始隐藏，解锁后永久显示） -->
        <button class="btn-action hidden" id="btnGoto">
            前往线下应援区域
            <span class="arrow">➜</span>
        </button>

        <!-- 返回 -->
        <div class="back-wrap">
            <a href="index.html" class="btn-back" id="btnBack">⬅ 要不还是继续睡吧</a>
        </div>

        <!-- 页脚 -->
        <div class="footer">
            <span class="page-num">📍 一号训练室 · 4/7</span>
            <span class="brand">✦ 乘风 ✦</span>
        </div>

    </div>

    <script>
        // ================================================================
        //  1. 逐行显示文本（间隔 600ms）
        // ================================================================
        document.addEventListener('DOMContentLoaded', function() {
            const lines = document.querySelectorAll('.line');
            const btnGoto = document.getElementById('btnGoto');
            const btnBack = document.getElementById('btnBack');
            const btnGameStart = document.getElementById('btnGameStart');

            // 初始禁用返回和开始按钮
            btnBack.classList.remove('enabled');
            btnGameStart.disabled = true;

            let lineIndex = 0;
            const intervalTime = 600;

            function showNextLine() {
                if (lineIndex < lines.length) {
                    lines[lineIndex].classList.add('visible');
                    lineIndex++;
                    setTimeout(showNextLine, intervalTime);
                } else {
                    btnBack.classList.add('enabled');
                    btnGameStart.disabled = false;
                    showToast('📖 故事已展开，开始闯关吧！');
                }
            }

            setTimeout(showNextLine, 300);

            // ================================================================
            //  2. 跳跃游戏逻辑（图片加载方式与 jump.html 一致）
            // ================================================================

            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            const gameStatus = document.getElementById('gameStatus');
            const gameHint = document.getElementById('gameHint');
            const gameMessage = document.getElementById('gameMessage');

            // ---- 配置 ----
            const NUM_OBSTACLES = 10;
            const GRAVITY = 0.6;
            const JUMP_SPEED = -15; // 调高跳跃速度，跳得更高
            const OBSTACLE_SPEED = 4.3;
            const GROUND_RATIO = 0.80;

            const W = 800,
                H = 400;
            const GROUND_Y = H * GROUND_RATIO;

            // ---- 状态 ----
            const STATE = { IDLE: 'idle', RUNNING: 'running', FAILED: 'failed', SUCCESS: 'success' };
            let gameState = STATE.IDLE;
            let score = 0;
            let totalObstaclesSpawned = 0;

            // ---- 成功解锁标记（一旦为 true，永久保留成功UI） ----
            let successUnlocked = false;

            // ---- 角色（尺寸放大：80x84） ----
            const role = {
                x: 80,
                y: 0,
                width: 80,
                height: 84,
                vy: 0,
                isGrounded: true,
                get left() { return this.x + 6; },
                get right() { return this.x + this.width - 6; },
                get top() { return this.y + 4; },
                get bottom() { return this.y + this.height - 2; },
            };
            const ROLE_INIT_Y = GROUND_Y - role.height;

            let obstacles = [];
            let successPlaced = false;
            let frameCounter = 0;
            const SPAWN_INTERVAL = 70;

            // ---- 图片对象 ----
            const images = {
                background: null,
                role: null,
                obstacle1: null,
                obstacle2: null,
                obstacle3: null,
                obstacle4: null,
                success: null,
            };
            let imagesLoaded = 0;
            let allLoaded = false;

            // ---- 占位生成函数（用于onerror回退） ----
            function createPlaceholderImg(label, color = '#999', textColor = '#fff') {
                const c = document.createElement('canvas');
                c.width = 64;
                c.height = 64;
                const cx = c.getContext('2d');
                cx.fillStyle = color;
                cx.fillRect(0, 0, 64, 64);
                cx.fillStyle = textColor;
                cx.font = '16px sans-serif';
                cx.textAlign = 'center';
                cx.textBaseline = 'middle';
                cx.fillText(label, 32, 32);
                const img = new Image();
                img.src = c.toDataURL();
                return img;
            }

            // ---- 加载图片（与 jump.html 一致） ----
            function loadImages(callback) {
                const totalImages = 7;
                let loaded = 0;

                function onLoad() {
                    loaded++;
                    if (loaded === totalImages) {
                        allLoaded = true;
                        callback();
                    }
                }

                // 背景
                const bg = new Image();
                bg.onload = onLoad;
                bg.onerror = () => { images.background = createPlaceholderImg('Bg', '#87CEEB', '#555');
                    onLoad(); };
                bg.src = './background.jpg';
                images.background = bg;

                // 角色
                const roleImg = new Image();
                roleImg.onload = onLoad;
                roleImg.onerror = () => { images.role = createPlaceholderImg('🦕', '#4CAF50', '#fff');
                    onLoad(); };
                roleImg.src = './role.png';
                images.role = roleImg;

                // 障碍物 1~4
                for (let i = 1; i <= 4; i++) {
                    const obs = new Image();
                    obs.onload = onLoad;
                    obs.onerror = (function(idx) {
                        return function() {
                            const colors = ['#E74C3C', '#E67E22', '#9B59B6', '#3498DB'];
                            images[`obstacle${idx}`] = createPlaceholderImg(`O${idx}`, colors[idx - 1], '#fff');
                            onLoad();
                        };
                    })(i);
                    obs.src = `./obstacle${i}.png`;
                    images[`obstacle${i}`] = obs;
                }

                // 成功旗帜
                const suc = new Image();
                suc.onload = onLoad;
                suc.onerror = () => { images.success = createPlaceholderImg('🏁', '#F1C40F', '#000');
                    onLoad(); };
                suc.src = './success.png';
                images.success = suc;
            }

            // ---- 工具函数 ----
            function rectCollide(x1, y1, w1, h1, x2, y2, w2, h2) {
                return x1 < x2 + w2 && x1 + w1 > x2 &&
                    y1 < y2 + h2 && y1 + h1 > y2;
            }

            // ---- 定时器管理 ----
            let successButtonTimer = null;

            // ---- 重置UI（隐藏成功消息和按钮） ----
            // 注意：如果 successUnlocked 为 true，则不执行任何隐藏操作
            function hideSuccessUI() {
                if (successUnlocked) return; // 已解锁，永久保留
                gameMessage.classList.remove('show');
                btnGoto.classList.add('hidden');
                btnGoto.classList.remove('enabled');
                if (successButtonTimer) {
                    clearTimeout(successButtonTimer);
                    successButtonTimer = null;
                }
            }

            // ---- 显示成功UI（先显示消息，延迟显示按钮） ----
            function showSuccessUI() {
                successUnlocked = true; // 标记已解锁，永久保留
                gameMessage.classList.add('show');
                if (successButtonTimer) {
                    clearTimeout(successButtonTimer);
                    successButtonTimer = null;
                }
                successButtonTimer = setTimeout(() => {
                    btnGoto.classList.remove('hidden');
                    btnGoto.classList.add('enabled');
                    successButtonTimer = null;
                }, 200);
            }

            // ---- 重置游戏数据（保留成功UI如果已解锁） ----
            function resetGame() {
                // 重置数据
                role.y = ROLE_INIT_Y;
                role.vy = 0;
                role.isGrounded = true;
                obstacles = [];
                successPlaced = false;
                frameCounter = 0;
                score = 0;
                totalObstaclesSpawned = 0;

                // 根据 successUnlocked 决定是否隐藏成功UI
                hideSuccessUI();

                gameState = STATE.IDLE;
                btnGameStart.textContent = '🚀 开始';
                btnGameStart.disabled = false;
                btnGameStart.className = 'btn-game';
                gameStatus.textContent = '点击「🚀 开始」出发';
                gameHint.textContent = '👆 点击画面 / 空格跳跃';
                draw();
            }

            // ---- 开始游戏 ----
            function startGame() {
                if (gameState === STATE.RUNNING) return;
                // 重置数据（保留成功UI如果已解锁）
                resetGame();
                // 覆盖为运行状态
                gameState = STATE.RUNNING;
                btnGameStart.textContent = '⏳ 进行中...';
                btnGameStart.disabled = true;
                btnGameStart.className = 'btn-game';
                gameStatus.textContent = '🏃 闯关中...';
                gameHint.textContent = '👆 跳跃躲避障碍物';
                spawnObstacle();
                draw();
            }

            // ---- 生成障碍物（尺寸放大：54x58） ----
            function spawnObstacle() {
                if (successPlaced) return;
                if (totalObstaclesSpawned >= NUM_OBSTACLES) {
                    const sw = 48,
                        sh = 48;
                    obstacles.push({
                        x: W + 20,
                        y: GROUND_Y - sh,
                        width: sw,
                        height: sh,
                        type: 'success',
                        passed: false,
                        isSuccess: true,
                    });
                    successPlaced = true;
                    return;
                }
                const type = Math.floor(Math.random() * 4) + 1;
                const ow = 54,
                    oh = 58;
                obstacles.push({
                    x: W + 10,
                    y: GROUND_Y - oh,
                    width: ow,
                    height: oh,
                    type: type,
                    passed: false,
                    isSuccess: false,
                });
                totalObstaclesSpawned++;
            }

            // ---- 跳跃 ----
            function jump() {
                if (gameState !== STATE.RUNNING) return;
                if (!role.isGrounded) return;
                role.vy = JUMP_SPEED;
                role.isGrounded = false;
            }

            // ---- 更新 ----
            function update() {
                if (gameState !== STATE.RUNNING) return;

                // 重力
                role.vy += GRAVITY;
                role.y += role.vy;
                if (role.y >= ROLE_INIT_Y) {
                    role.y = ROLE_INIT_Y;
                    role.vy = 0;
                    role.isGrounded = true;
                }

                // 更新障碍物
                for (let i = obstacles.length - 1; i >= 0; i--) {
                    const ob = obstacles[i];
                    ob.x -= OBSTACLE_SPEED;

                    if (!ob.isSuccess && !ob.passed) {
                        if (ob.x + ob.width < role.x) {
                            ob.passed = true;
                            score++;
                        }
                    }

                    if (ob.isSuccess) {
                        if (role.x > ob.x + ob.width) {
                            gameState = STATE.SUCCESS;
                            // 显示成功UI（永久解锁）
                            showSuccessUI();
                            btnGameStart.textContent = '🔄 再来一次';
                            btnGameStart.disabled = false;
                            btnGameStart.className = 'btn-game btn-success';
                            gameStatus.textContent = '🌟 成功抵达！';
                            gameHint.textContent = '🎉 太棒了！';
                            showToast('🎉 闯关成功！前往线下应援吧！');
                            return;
                        }
                        if (ob.x + ob.width < -20) {
                            gameState = STATE.FAILED;
                            btnGameStart.textContent = '🔄 再来一次';
                            btnGameStart.disabled = false;
                            btnGameStart.className = 'btn-game btn-danger';
                            gameStatus.textContent = '💥 撞到啦！';
                            gameHint.textContent = '💔 再试一次吧';
                            return;
                        }
                    } else {
                        const collides = rectCollide(
                            role.left, role.top, role.right - role.left, role.bottom - role.top,
                            ob.x + 4, ob.y + 4, ob.width - 8, ob.height - 8
                        );
                        if (collides) {
                            gameState = STATE.FAILED;
                            btnGameStart.textContent = '🔄 再来一次';
                            btnGameStart.disabled = false;
                            btnGameStart.className = 'btn-game btn-danger';
                            gameStatus.textContent = '💥 撞到啦！';
                            gameHint.textContent = '💔 再试一次吧';
                            showToast('💥 撞到障碍物了！再试一次');
                            return;
                        }
                    }

                    if (!ob.isSuccess && ob.x + ob.width < -20) {
                        obstacles.splice(i, 1);
                    }
                }

                // 生成新障碍物
                if (!successPlaced) {
                    frameCounter++;
                    if (frameCounter >= SPAWN_INTERVAL) {
                        frameCounter = 0;
                        const activeCount = obstacles.filter(o => !o.isSuccess).length;
                        if (activeCount < 2) {
                            spawnObstacle();
                        }
                    }
                }

                // 如果所有障碍物已通过但还没放置终点
                if (gameState === STATE.RUNNING && !successPlaced && score >= NUM_OBSTACLES) {
                    const sw = 48,
                        sh = 48;
                    obstacles.push({
                        x: W + 20,
                        y: GROUND_Y - sh,
                        width: sw,
                        height: sh,
                        type: 'success',
                        passed: false,
                        isSuccess: true,
                    });
                    successPlaced = true;
                }
            }

            // ---- 绘制 ----
            function draw() {
                ctx.clearRect(0, 0, W, H);

                // 背景
                const bgImg = images.background;
                if (bgImg && bgImg.complete && bgImg.naturalWidth > 0) {
                    ctx.drawImage(bgImg, 0, 0, W, H);
                } else {
                    const grad = ctx.createLinearGradient(0, 0, 0, H);
                    grad.addColorStop(0, '#87CEEB');
                    grad.addColorStop(0.7, '#f5e6c8');
                    grad.addColorStop(1, '#d4b896');
                    ctx.fillStyle = grad;
                    ctx.fillRect(0, 0, W, H);
                    ctx.strokeStyle = '#8B7D6B';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.moveTo(0, GROUND_Y);
                    ctx.lineTo(W, GROUND_Y);
                    ctx.stroke();
                }

                // 障碍物
                for (const ob of obstacles) {
                    let img = null;
                    if (ob.isSuccess) {
                        img = images.success;
                    } else {
                        img = images[`obstacle${ob.type}`];
                    }
                    if (img && img.complete && img.naturalWidth > 0) {
                        ctx.drawImage(img, ob.x, ob.y, ob.width, ob.height);
                    } else {
                        ctx.fillStyle = ob.isSuccess ? '#FFD700' : '#E74C3C';
                        ctx.fillRect(ob.x, ob.y, ob.width, ob.height);
                        ctx.strokeStyle = '#333';
                        ctx.lineWidth = 1;
                        ctx.strokeRect(ob.x, ob.y, ob.width, ob.height);
                        if (ob.isSuccess) {
                            ctx.fillStyle = '#fff';
                            ctx.font = '20px sans-serif';
                            ctx.textAlign = 'center';
                            ctx.textBaseline = 'middle';
                            ctx.fillText('🏁', ob.x + ob.width / 2, ob.y + ob.height / 2);
                        }
                    }
                }

                // 角色
                const roleImg = images.role;
                if (roleImg && roleImg.complete && roleImg.naturalWidth > 0) {
                    ctx.drawImage(roleImg, role.x, role.y, role.width, role.height);
                } else {
                    ctx.fillStyle = '#4CAF50';
                    ctx.fillRect(role.x, role.y, role.width, role.height);
                    ctx.strokeStyle = '#2E7D32';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(role.x, role.y, role.width, role.height);
                    ctx.fillStyle = '#fff';
                    ctx.font = '18px sans-serif';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('🦕', role.x + role.width / 2, role.y + role.height / 2);
                }

                // 进度条
                ctx.fillStyle = 'rgba(0,0,0,0.55)';
                ctx.beginPath();
                if (ctx.roundRect) ctx.roundRect(12, 12, 160, 38, 12);
                else ctx.rect(12, 12, 160, 38);
                ctx.fill();
                ctx.fillStyle = '#fff5e0';
                ctx.font = 'bold 18px "Segoe UI", sans-serif';
                ctx.textAlign = 'left';
                ctx.textBaseline = 'middle';
                const progress = Math.min(score / NUM_OBSTACLES, 1);
                ctx.fillText(`🏃 ${score} / ${NUM_OBSTACLES}`, 28, 34);

                const barX = 178,
                    barY = 22,
                    barW = 120,
                    barH = 14;
                ctx.fillStyle = 'rgba(255,255,255,0.2)';
                ctx.beginPath();
                if (ctx.roundRect) ctx.roundRect(barX, barY, barW, barH, 7);
                else ctx.rect(barX, barY, barW, barH);
                ctx.fill();
                ctx.fillStyle = progress >= 1 ? '#4ecdc4' : '#FFD700';
                ctx.beginPath();
                if (ctx.roundRect) ctx.roundRect(barX + 2, barY + 2, Math.max(0, (barW - 4) * progress), barH - 4, 5);
                else ctx.rect(barX + 2, barY + 2, Math.max(0, (barW - 4) * progress), barH - 4);
                ctx.fill();

                // 状态叠加文字
                if (gameState === STATE.IDLE) {
                    ctx.fillStyle = 'rgba(0,0,0,0.5)';
                    ctx.beginPath();
                    if (ctx.roundRect) ctx.roundRect(W / 2 - 200, H / 2 - 30, 400, 50, 16);
                    else ctx.rect(W / 2 - 200, H / 2 - 30, 400, 50);
                    ctx.fill();
                    ctx.fillStyle = '#fff';
                    ctx.font = 'bold 20px "Segoe UI", sans-serif';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('🖱️ 点击「🚀 开始」出发', W / 2, H / 2 + 2);
                } else if (gameState === STATE.FAILED) {
                    ctx.fillStyle = 'rgba(200,0,0,0.6)';
                    ctx.beginPath();
                    if (ctx.roundRect) ctx.roundRect(W / 2 - 90, H / 2 - 30, 180, 50, 16);
                    else ctx.rect(W / 2 - 90, H / 2 - 30, 180, 50);
                    ctx.fill();
                    ctx.fillStyle = '#fff';
                    ctx.font = 'bold 24px "Segoe UI", sans-serif';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('💥 撞到啦！', W / 2, H / 2);
                } else if (gameState === STATE.SUCCESS) {
                    ctx.fillStyle = 'rgba(255,215,0,0.25)';
                    ctx.beginPath();
                    if (ctx.roundRect) ctx.roundRect(W / 2 - 130, H / 2 - 40, 260, 70, 20);
                    else ctx.rect(W / 2 - 130, H / 2 - 40, 260, 70);
                    ctx.fill();
                    ctx.fillStyle = '#FFD700';
                    ctx.font = 'bold 32px "Segoe UI", sans-serif';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.shadowColor = '#FFD700';
                    ctx.shadowBlur = 20;
                    ctx.fillText('🌟 成功抵达！', W / 2, H / 2 + 2);
                    ctx.shadowBlur = 0;
                }
            }

            // ---- 游戏循环 ----
            function gameLoop() {
                update();
                draw();
                requestAnimationFrame(gameLoop);
            }

            // ---- 事件绑定 ----
            canvas.addEventListener('click', () => jump());
            document.addEventListener('keydown', (e) => {
                if (e.key === ' ' || e.key === 'Space' || e.key === 'ArrowUp') {
                    e.preventDefault();
                    jump();
                }
            });

            // 按钮点击：根据文字决定行为
            btnGameStart.addEventListener('click', () => {
                const text = btnGameStart.textContent.trim();
                if (text === '🚀 开始') {
                    startGame();
                    return;
                }
                if (text === '🔄 再来一次') {
                    resetGame();
                }
            });

            btnGoto.addEventListener('click', () => {
                if (btnGoto.classList.contains('enabled')) {
                    window.location.href = 'page5.html';
                }
            });

            // ---- 初始化 ----
            function init() {
                role.y = ROLE_INIT_Y;
                role.isGrounded = true;
                gameState = STATE.IDLE;
                btnGameStart.textContent = '🚀 开始';
                btnGameStart.disabled = false;
                btnGameStart.className = 'btn-game';
                successUnlocked = false;
                hideSuccessUI();
                gameStatus.textContent = '点击「🚀 开始」出发';
                gameHint.textContent = '👆 点击画面 / 空格跳跃';
                draw();
                gameLoop();
            }

            // ---- 加载图片并启动 ----
            loadImages(() => {
                init();
            });

            // 超时兜底（4秒后无论是否加载完成都启动）
            setTimeout(() => {
                if (!allLoaded) {
                    const names = ['background', 'role', 'obstacle1', 'obstacle2', 'obstacle3', 'obstacle4', 'success'];
                    names.forEach(name => {
                        if (!images[name] || !images[name].complete) {
                            images[name] = createPlaceholderImg(name.slice(0, 6), '#999', '#fff');
                        }
                    });
                    allLoaded = true;
                    init();
                }
            }, 4000);

            // ---- roundRect polyfill ----
            if (!CanvasRenderingContext2D.prototype.roundRect) {
                CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, radii) {
                    const r = typeof radii === 'number' ? radii : (radii || 0);
                    this.moveTo(x + r, y);
                    this.lineTo(x + w - r, y);
                    this.quadraticCurveTo(x + w, y, x + w, y + r);
                    this.lineTo(x + w, y + h - r);
                    this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
                    this.lineTo(x + r, y + h);
                    this.quadraticCurveTo(x, y + h, x, y + h - r);
                    this.lineTo(x, y + r);
                    this.quadraticCurveTo(x, y, x + r, y);
                    this.closePath();
                    return this;
                };
            }

            // ================================================================
            //  3. Toast 函数
            // ================================================================

            function showToast(msg, duration = 2000) {
                const toast = document.getElementById('toast');
                toast.textContent = msg;
                toast.classList.add('show');
                clearTimeout(window.toastTimer);
                window.toastTimer = setTimeout(() => {
                    toast.classList.remove('show');
                }, duration);
            }

            // 暴露给全局（用于调试）
            window.showToast = showToast;

        });
    </script>

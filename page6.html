<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>乘风 · 一号训练室 · 夜晚</title>
    <style>
        /* ===== 全局风格（深色暖调复古梦幻） ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'PingFang SC', Roboto, 'Helvetica Neue', sans-serif;
            background: #1a1410;
            color: #f0e6d8;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .page {
            width: 100%;
            max-width: 560px;
            min-height: 700px;
            background: #2d231e;
            border-radius: 32px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8), inset 0 1px 0 rgba(255, 215, 170, 0.08);
            padding: 24px 20px 28px;
            border: 1px solid #4d3a30;
            display: flex;
            flex-direction: column;
            animation: fadeUp 0.5s ease-out;
            position: relative;
            overflow: hidden;
        }

        @keyframes fadeUp {
            0% {
                opacity: 0;
                transform: translateY(24px);
            }

            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 10px;
            border-bottom: 2px solid #5f4336;
            margin-bottom: 16px;
        }

        .page-header .id {
            font-size: 18px;
            font-weight: 700;
            color: #f5dcc8;
            letter-spacing: 2px;
        }

        .page-header .badge {
            font-size: 14px;
            font-weight: 400;
            background: #4d342b;
            padding: 2px 16px;
            border-radius: 40px;
            color: #c9b09d;
        }

        /* ===== 故事文本容器 ===== */
        .story-block {
            background: rgba(40, 28, 22, 0.7);
            border-radius: 18px;
            padding: 18px 20px;
            border-left: 4px solid #b8875e;
            backdrop-filter: blur(4px);
            box-shadow: inset 0 1px 0 rgba(255, 215, 170, 0.04);
            margin-bottom: 16px;
            flex-shrink: 0;
            min-height: 120px;
        }

        .line {
            font-size: 16px;
            line-height: 2;
            color: #e8d9cd;
            margin-bottom: 6px;
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.4s ease, transform 0.4s ease;
        }

        .line.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .line.empty {
            height: 0.8em;
            margin-bottom: 0;
        }

        .line .highlight {
            color: #fad5b0;
            font-weight: 600;
        }

        /* ===== 拼图区域（图片拼图） ===== */
        .puzzle-section {
            background: rgba(40, 28, 22, 0.5);
            border-radius: 18px;
            padding: 16px 14px;
            margin-bottom: 14px;
            border: 1px solid #4d3a30;
            flex-shrink: 0;
            text-align: center;
        }

        .puzzle-title {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 14px;
            color: #b0907a;
            margin-bottom: 10px;
            flex-wrap: wrap;
            gap: 6px;
        }

        .puzzle-title .status {
            color: #dccbc0;
            font-weight: 500;
        }

        #puzzle {
            width: 100%;
            max-width: 300px;
            aspect-ratio: 1 / 1;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            border: 4px solid #5f4336;
            border-radius: 12px;
            overflow: hidden;
            background: #2d1f1a;
        }

        .tile {
            border: 1px solid #4d3a30;
            cursor: pointer;
            box-sizing: border-box;
            background-size: 300% 300%;
            background-repeat: no-repeat;
            transition: transform 0.1s;
            background-color: #5f483c;
        }

        .tile:not(.empty):hover {
            transform: scale(1.04);
            border-color: #b8875e;
            z-index: 2;
        }

        .tile:not(.empty):active {
            transform: scale(0.95);
        }

        .tile.empty {
            background: #2d1f1a !important;
            border-color: #2d1f1a;
            cursor: default;
        }

        .puzzle-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            margin-top: 12px;
            flex-wrap: wrap;
        }

        .puzzle-controls .btn-shuffle {
            background: #4d342b;
            border: none;
            border-radius: 40px;
            color: #c9b09d;
            padding: 6px 20px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 3px 0 #2f221b;
            flex-shrink: 0;
        }

        .puzzle-controls .btn-shuffle:hover {
            background: #5f483c;
            transform: translateY(-2px);
            box-shadow: 0 5px 0 #2f221b;
        }

        .puzzle-controls .btn-shuffle:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #2f221b;
        }

        .puzzle-controls .puzzle-hint {
            font-size: 13px;
            color: #8a7668;
            display: flex;
            align-items: center;
            flex-shrink: 0;
        }

        /* ===== 「看视频跳过」按钮（金色醒目） ===== */
        .btn-skip {
            background: #b8875e;
            border: none;
            border-radius: 40px;
            color: #2d1f1a;
            padding: 6px 20px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 3px 0 #7a5a47;
            flex-shrink: 0;
            letter-spacing: 0.5px;
            position: relative;
        }

        .btn-skip:hover {
            background: #d4a574;
            transform: translateY(-2px);
            box-shadow: 0 5px 0 #7a5a47;
        }

        .btn-skip:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #7a5a47;
        }

        /* 如果希望按钮在移动端更易点，增加点击区域 */
        .btn-skip::after {
            content: '';
            position: absolute;
            inset: -6px;
            border-radius: 50px;
        }

        /* ===== 消息区域（拼图完成后显示） ===== */
        .puzzle-message {
            background: rgba(40, 28, 22, 0.7);
            border-radius: 16px;
            padding: 14px 16px;
            margin-top: 12px;
            border: 1px solid #b8875e;
            display: none;
            font-size: 15px;
            line-height: 1.6;
            color: #fad5b0;
            text-align: center;
        }

        .puzzle-message .highlight-pwd {
            color: #ffd700;
            font-weight: 700;
            font-size: 20px;
            letter-spacing: 4px;
            font-family: 'Courier New', monospace;
        }

        /* ===== 密码输入区域（四个格子） ===== */
        .password-section {
            background: rgba(40, 28, 22, 0.5);
            border-radius: 18px;
            padding: 12px 16px;
            margin-bottom: 14px;
            border: 1px solid #4d3a30;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .password-section label {
            font-size: 14px;
            color: #b0907a;
            font-weight: 500;
            margin-right: 4px;
        }

        .pwd-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            align-items: center;
        }

        .pwd-digit {
            width: 48px;
            height: 56px;
            border: 2px solid #5f4336;
            border-radius: 12px;
            background: #2d1f1a;
            color: #f0e6d8;
            font-size: 28px;
            font-family: 'Courier New', monospace;
            text-align: center;
            outline: none;
            transition: border 0.2s, box-shadow 0.2s;
            caret-color: #b8875e;
        }

        .pwd-digit:focus {
            border-color: #b8875e;
            box-shadow: 0 0 0 3px rgba(184, 135, 94, 0.2);
        }

        .pwd-digit::placeholder {
            color: #5f483c;
            font-size: 18px;
            opacity: 0.5;
        }

        .pwd-digit::-webkit-outer-spin-button,
        .pwd-digit::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .pwd-digit {
            appearance: textfield;
        }

        /* ===== 开箱按钮 ===== */
        .btn-action {
            display: block;
            width: 100%;
            padding: 16px 20px;
            background: #7a5a47;
            border: none;
            border-radius: 40px;
            color: #f5ede5;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.25s;
            box-shadow: 0 6px 0 #4d342b, 0 8px 24px rgba(0, 0, 0, 0.4);
            text-align: center;
            letter-spacing: 3px;
            margin-top: 2px;
            user-select: none;
            touch-action: manipulation;
            opacity: 0.5;
            pointer-events: none;
        }

        .btn-action.enabled {
            opacity: 1;
            pointer-events: auto;
        }

        .btn-action:hover.enabled {
            transform: translateY(-3px);
            box-shadow: 0 8px 0 #4d342b, 0 12px 32px rgba(0, 0, 0, 0.5);
            background: #8d6a55;
        }

        .btn-action:active.enabled {
            transform: translateY(6px);
            box-shadow: 0 2px 0 #4d342b;
        }

        .btn-action .arrow {
            display: inline-block;
            margin-left: 10px;
            transition: transform 0.2s;
        }

        .btn-action:hover.enabled .arrow {
            transform: translateX(4px);
        }

        /* ===== 返回按钮 ===== */
        .btn-back {
            display: inline-block;
            padding: 8px 20px;
            background: #4d342b;
            border: none;
            border-radius: 40px;
            color: #c9b09d;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 3px 0 #2f221b;
            text-decoration: none;
            text-align: center;
            margin-top: 10px;
            opacity: 0.6;
            pointer-events: none;
        }

        .btn-back.enabled {
            opacity: 1;
            pointer-events: auto;
        }

        .btn-back.enabled:hover {
            background: #5f483c;
            transform: translateY(-2px);
            box-shadow: 0 5px 0 #2f221b;
        }

        .btn-back.enabled:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #2f221b;
        }

        .back-wrap {
            margin-top: 10px;
            text-align: center;
        }

        /* ===== 页脚 ===== */
        .footer {
            margin-top: auto;
            padding-top: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            color: #7a6558;
            border-top: 1px solid #3d2c23;
            flex-shrink: 0;
        }

        .footer .page-num {
            background: #2d1f1a;
            padding: 2px 16px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 500;
            color: #b0907a;
        }

        .footer .brand {
            letter-spacing: 1px;
            opacity: 0.7;
        }

        /* ===== Toast ===== */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #2d1f1a;
            padding: 12px 28px;
            border-radius: 40px;
            border: 1px solid #b8875e;
            color: #f5ede5;
            font-size: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
            z-index: 999;
            opacity: 0;
            transition: opacity 0.3s, transform 0.3s;
            pointer-events: none;
            max-width: 90%;
            text-align: center;
            backdrop-filter: blur(8px);
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* ===== 响应式 ===== */
        @media (max-width: 480px) {
            .page {
                padding: 18px 14px 22px;
                min-height: 600px;
                border-radius: 24px;
            }

            .page-header .id {
                font-size: 16px;
            }

            .line {
                font-size: 15px;
                line-height: 1.9;
            }

            .btn-action {
                font-size: 16px;
                padding: 14px 16px;
            }

            #puzzle {
                max-width: 240px;
            }

            .pwd-digit {
                width: 40px;
                height: 48px;
                font-size: 24px;
            }

            .pwd-group {
                gap: 8px;
            }

            .puzzle-controls {
                gap: 8px;
            }

            .btn-skip {
                padding: 6px 14px;
                font-size: 12px;
            }

            .puzzle-controls .puzzle-hint {
                font-size: 12px;
            }
        }

        @media (max-width: 380px) {
            .line {
                font-size: 14px;
            }

            #puzzle {
                max-width: 200px;
            }

            .pwd-digit {
                width: 34px;
                height: 42px;
                font-size: 20px;
            }

            .pwd-group {
                gap: 6px;
            }

            .btn-skip {
                padding: 5px 12px;
                font-size: 11px;
            }
        }
    </style>
</head>

<body>

    <!-- Toast -->
    <div id="toast" class="toast"></div>

    <div class="page" id="page-gameend">

        <!-- 标题 -->
        <div class="page-header">
            <span class="id">🌙 一号训练室 · 夜晚</span>
            <span class="badge">6 / 7</span>
        </div>

        <!-- 故事内容（逐行显示） -->
        <div class="story-block" id="storyBlock">
            <div class="line">在应援地点玩了一会儿，不知不觉已经到了晚上。</div>
            <div class="line">夜晚的训练室静谧无声。</div>
            <div class="line">突然，一个 <span class="highlight">幽幽</span> 👻 的身影飘了出来！</div>
            <div class="line">“哇！你吓到我了！……能帮我 <span class="highlight">收集魂魄</span> 吗？”</div>
            <div class="line empty"></div>
            <div class="line">“拼好我的魂魄，送你密码！”</div>
            <div class="line empty"></div>
            <div class="line">你接过了幽幽的魂魄碎片……</div>
            <div class="line">碎片上似乎刻着图案，需要按顺序排列。</div>
        </div>

        <!-- 拼图区域（图片拼图） -->
        <div class="puzzle-section">
            <div class="puzzle-title">
                <span>🧩 魂魄拼图</span>
                <span class="status" id="puzzleStatus">点击碎片移动</span>
            </div>
            <div id="puzzle"></div>
            <div class="puzzle-controls">
                <button class="btn-shuffle" id="btnShuffle">🔀 打乱</button>
                <span class="puzzle-hint" id="puzzleHint">👆 点击相邻碎片移动</span>
                <button class="btn-skip" id="btnSkipVideo">🎬 看视频跳过</button>
            </div>
            <!-- 拼图完成后的消息（动态填充） -->
            <div id="puzzleMessage" class="puzzle-message"></div>
        </div>

        <!-- 密码输入区域（四个格子） -->
        <div class="password-section">
            <label for="pwdDigit0">🔐 密码：</label>
            <div class="pwd-group" id="pwdGroup">
                <input type="text" class="pwd-digit" id="pwdDigit0" maxlength="1" inputmode="numeric" pattern="\d"
                    autocomplete="off" placeholder="·">
                <input type="text" class="pwd-digit" id="pwdDigit1" maxlength="1" inputmode="numeric" pattern="\d"
                    autocomplete="off" placeholder="·">
                <input type="text" class="pwd-digit" id="pwdDigit2" maxlength="1" inputmode="numeric" pattern="\d"
                    autocomplete="off" placeholder="·">
                <input type="text" class="pwd-digit" id="pwdDigit3" maxlength="1" inputmode="numeric" pattern="\d"
                    autocomplete="off" placeholder="·">
            </div>
        </div>

        <!-- 开箱按钮 -->
        <button class="btn-action" id="btnUnlock">
            开启宝箱
            <span class="arrow">➜</span>
        </button>

        <!-- 返回 -->
        <div class="back-wrap">
            <a href="index.html" class="btn-back" id="btnBack">⬅ 既然已经晚上了，还是睡觉吧</a>
        </div>

        <!-- 页脚 -->
        <div class="footer">
            <span class="page-num">📍 一号训练室 · 6/7</span>
            <span class="brand">✦ 乘风 ✦</span>
        </div>

    </div>

    <script>
        // ================================================================
        //  🔑 自定义密码（修改变量即可更改箱子的密码，必须为4位数字字符串）
        // ================================================================
        const CORRECT_PASSWORD = '0508'; // 可改为任意4位数字，如 '2024'

        // ================================================================
        //  1. 逐行显示文本（间隔 700ms）
        // ================================================================
        document.addEventListener('DOMContentLoaded', function () {
            const lines = document.querySelectorAll('.line');
            const btnUnlock = document.getElementById('btnUnlock');
            const btnBack = document.getElementById('btnBack');
            const btnShuffle = document.getElementById('btnShuffle');
            const btnSkipVideo = document.getElementById('btnSkipVideo');

            // 初始禁用按钮
            btnUnlock.classList.remove('enabled');
            btnBack.classList.remove('enabled');

            let lineIndex = 0;
            const intervalTime = 700;

            function showNextLine() {
                if (lineIndex < lines.length) {
                    lines[lineIndex].classList.add('visible');
                    lineIndex++;
                    setTimeout(showNextLine, intervalTime);
                } else {
                    btnBack.classList.add('enabled');
                    showToast('📖 故事已展开，开始拼图吧');
                }
            }

            setTimeout(showNextLine, 300);

            // ================================================================
            //  2. 拼图逻辑（图片拼图）
            // ================================================================

            const SIZE = 3;
            const TOTAL = 9;

            let board = [];
            let emptyIndex = 8; // 固定为右下角索引
            let puzzleSolved = false; // 当前拼图是否处于完成状态
            let hasEverSolved = false; // 是否曾经完成过拼图（用于保留消息）

            const puzzleEl = document.getElementById('puzzle');
            const puzzleStatus = document.getElementById('puzzleStatus');
            const puzzleHint = document.getElementById('puzzleHint');
            const puzzleMessage = document.getElementById('puzzleMessage');

            // 工具函数
            function isAdjacent(i, j) {
                const r1 = Math.floor(i / SIZE);
                const c1 = i % SIZE;
                const r2 = Math.floor(j / SIZE);
                const c2 = j % SIZE;
                return Math.abs(r1 - r2) + Math.abs(c1 - c2) === 1;
            }

            // 计算逆序数（忽略空格 8）
            function countInversions(arr) {
                let inv = 0;
                for (let i = 0; i < arr.length; i++) {
                    for (let j = i + 1; j < arr.length; j++) {
                        if (arr[i] !== 8 && arr[j] !== 8 && arr[i] > arr[j]) {
                            inv++;
                        }
                    }
                }
                return inv;
            }

            // 检查是否为已解决状态（0-8顺序，空格在最后）
            function isSolvedArray(arr) {
                for (let i = 0; i < 9; i++) {
                    if (arr[i] !== i) return false;
                }
                return true;
            }

            // 生成一个可解且空格在右下角（索引8）的随机排列
            function generateSolvableBoard() {
                let arr = [0, 1, 2, 3, 4, 5, 6, 7, 8];
                do {
                    // 打乱前8个元素（0~7），保留8在最后
                    for (let i = 7; i > 0; i--) {
                        let j = Math.floor(Math.random() * (i + 1));
                        [arr[i], arr[j]] = [arr[j], arr[i]];
                    }
                    // 保证空格在索引8（已固定）
                    arr[8] = 8;
                    // 检查逆序数是否为偶数（可解），且不是已解决状态
                } while (countInversions(arr) % 2 !== 0 || isSolvedArray(arr));
                return arr;
            }

            // 渲染拼图
            function render() {
                puzzleEl.innerHTML = '';
                // 获取容器实际尺寸（像素），若容器未渲染则使用默认值
                const containerSize = puzzleEl.offsetWidth || 300;
                const tileSize = containerSize / SIZE;

                board.forEach((piece, index) => {
                    const div = document.createElement('div');
                    if (piece === 8) {
                        div.className = 'tile empty';
                    } else {
                        const row = Math.floor(piece / 3);
                        const col = piece % 3;
                        div.className = 'tile';
                        div.style.backgroundImage = "url('puzzle.jpg')";
                        div.style.backgroundSize = `${containerSize}px ${containerSize}px`;
                        div.style.backgroundPosition = `-${col * tileSize}px -${row * tileSize}px`;
                        div.addEventListener('click', () => {
                            move(index);
                        });
                    }
                    puzzleEl.appendChild(div);
                });
            }

            // 移动碎片
            function move(index) {
                if (!isAdjacent(index, emptyIndex)) {
                    return;
                }
                [board[index], board[emptyIndex]] = [board[emptyIndex], board[index]];
                emptyIndex = index;
                render();
                checkWin(false);
            }

            // 检查是否胜利
            function checkWin(showToastMsg = true) {
                if (isSolvedArray(board)) {
                    puzzleSolved = true;
                    hasEverSolved = true;
                    puzzleStatus.textContent = '✅ 拼图完成！';
                    puzzleHint.textContent = '🎉 获得密码！';
                    puzzleMessage.innerHTML = `
                                🙏 谢谢你帮我复原灵魂，我将箱子的密码告诉你作为报答，密码是：<span class="highlight-pwd">${CORRECT_PASSWORD}</span>
                            `;
                    puzzleMessage.style.display = 'block';
                    document.getElementById('btnUnlock').classList.add('enabled');
                    if (showToastMsg) {
                        showToast(`🎉 拼图完成！密码是 ${CORRECT_PASSWORD}`);
                    }
                    // 自动聚焦第一个密码格子
                    document.getElementById('pwdDigit0').focus();
                }
            }

            // 打乱拼图（空白格永远固定在右下角）
            function shufflePuzzle() {
                const wasEverSolved = hasEverSolved;

                // 生成新的可解排列（空格在右下角，且不是已解决状态）
                let newBoard = generateSolvableBoard();
                // 确保不是已解决（generateSolvableBoard 已保证，但以防万一）
                while (isSolvedArray(newBoard)) {
                    newBoard = generateSolvableBoard();
                }

                // 更新 board 和 emptyIndex
                board = newBoard;
                emptyIndex = 8; // 固定为右下角

                puzzleSolved = false;

                if (wasEverSolved) {
                    // 曾经完成过 → 保留消息和按钮启用状态
                    puzzleStatus.textContent = '🔄 已打乱 (密码已获得)';
                    puzzleHint.textContent = '🔓 可直接输入密码';
                    // 消息和按钮保持显示，不清空密码格子
                } else {
                    // 从未完成过 → 隐藏消息，禁用按钮，清空密码格子
                    puzzleMessage.style.display = 'none';
                    document.getElementById('btnUnlock').classList.remove('enabled');
                    puzzleStatus.textContent = '点击碎片移动';
                    puzzleHint.textContent = '👆 点击相邻碎片移动';
                    clearPwdInputs();
                }
                render();
                showToast('🔀 拼图已打乱');
            }

            // 初始化拼图
            function initPuzzle() {
                board = generateSolvableBoard();
                emptyIndex = 8;
                puzzleSolved = false;
                hasEverSolved = false;
                puzzleMessage.style.display = 'none';
                document.getElementById('btnUnlock').classList.remove('enabled');
                puzzleStatus.textContent = '点击碎片移动';
                puzzleHint.textContent = '👆 点击相邻碎片移动';
                render();
                clearPwdInputs();
            }

            // ================================================================
            //  3. 密码格子交互逻辑
            // ================================================================

            const pwdInputs = [
                document.getElementById('pwdDigit0'),
                document.getElementById('pwdDigit1'),
                document.getElementById('pwdDigit2'),
                document.getElementById('pwdDigit3')
            ];

            function clearPwdInputs() {
                pwdInputs.forEach(inp => { inp.value = ''; });
                pwdInputs[0].focus();
            }

            function getPwdFromInputs() {
                return pwdInputs.map(inp => inp.value).join('');
            }

            function handleDigitInput(e) {
                const input = e.target;
                let val = input.value;
                const digit = val.replace(/\D/g, '');
                if (digit !== val) {
                    input.value = digit;
                }
                if (digit.length === 1) {
                    const idx = parseInt(input.dataset.index);
                    if (idx < 3) {
                        pwdInputs[idx + 1].focus();
                    } else {
                        input.blur();
                    }
                }
            }

            function handleDigitKeydown(e) {
                const input = e.target;
                const idx = parseInt(input.dataset.index);
                if (e.key === 'Backspace') {
                    if (input.value === '' && idx > 0) {
                        pwdInputs[idx - 1].value = '';
                        pwdInputs[idx - 1].focus();
                        e.preventDefault();
                    } else if (input.value !== '') {
                        input.value = '';
                        e.preventDefault();
                    }
                }
            }

            function handlePaste(e) {
                e.preventDefault();
                const pasted = (e.clipboardData || window.clipboardData).getData('text');
                const digits = pasted.replace(/\D/g, '').slice(0, 4);
                if (digits.length === 0) return;
                for (let i = 0; i < 4; i++) {
                    pwdInputs[i].value = i < digits.length ? digits[i] : '';
                }
                const lastIdx = Math.min(digits.length - 1, 3);
                pwdInputs[lastIdx].focus();
            }

            function initPwdInputs() {
                pwdInputs.forEach((inp, idx) => {
                    inp.dataset.index = idx;
                    inp.addEventListener('input', handleDigitInput);
                    inp.addEventListener('keydown', handleDigitKeydown);
                    inp.addEventListener('paste', handlePaste);
                    inp.addEventListener('focus', function () {
                        this.select();
                    });
                });
            }

            // ================================================================
            //  4. 「看视频跳过」功能
            // ================================================================

            function handleSkipVideo() {
                // 1. 在新标签页打开B站视频
                const videoUrl =
                    'https://www.bilibili.com/video/BV16AjH6BEbd/?share_source=copy_web&vd_source=f3226a069ce630d0e5044135b74578d3';
                window.open(videoUrl, '_blank');

                // 2. 状态等同于拼图完成
                hasEverSolved = true;
                puzzleSolved = true;

                // 3. 更新状态文字
                puzzleStatus.textContent = '🎬 已跳过 (密码已获得)';
                puzzleHint.textContent = '🔓 可直接输入密码';

                // 4. 显示跳过消息（用户指定的文案）
                puzzleMessage.innerHTML = `
                            哈哈哈哈认输了吧，不过看在你懂得欣赏美妙音乐的份上，我将箱子的密码告诉你吧，密码是：<span class="highlight-pwd">${CORRECT_PASSWORD}</span>
                        `;
                puzzleMessage.style.display = 'block';

                // 5. 启用开箱按钮
                document.getElementById('btnUnlock').classList.add('enabled');

                // 6. 聚焦到第一个密码输入框
                document.getElementById('pwdDigit0').focus();

                // 7. Toast 提示
                showToast('🎬 视频已打开，密码已获得！');
            }

            // ================================================================
            //  5. 事件绑定
            // ================================================================

            document.getElementById('btnShuffle').addEventListener('click', shufflePuzzle);

            document.getElementById('btnSkipVideo').addEventListener('click', handleSkipVideo);

            document.getElementById('btnUnlock').addEventListener('click', function () {
                if (!hasEverSolved) {
                    showToast('🔍 请先完成拼图获得密码！');
                    return;
                }
                const inputPwd = getPwdFromInputs();
                if (inputPwd === CORRECT_PASSWORD) {
                    showToast('🔓 箱子打开了！前往成团之日…');
                    setTimeout(() => {
                        window.location.href = 'page7.html';
                    }, 600);
                } else {
                    showToast('❌ 密码错误，请重新输入');
                    clearPwdInputs();
                }
            });

            pwdInputs[3].addEventListener('keydown', function (e) {
                if (e.key === 'Enter') {
                    document.getElementById('btnUnlock').click();
                }
            });

            // ================================================================
            //  6. Toast 函数
            // ================================================================

            function showToast(msg, duration = 2000) {
                const toast = document.getElementById('toast');
                toast.textContent = msg;
                toast.classList.add('show');
                clearTimeout(window.toastTimer);
                window.toastTimer = setTimeout(() => {
                    toast.classList.remove('show');
                }, duration);
            }

            // ================================================================
            //  7. 启动
            // ================================================================

            initPwdInputs();
            initPuzzle();

        });
    </script>

</body>

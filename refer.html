        /* ===== 全局风格（深色暖调复古） ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'PingFang SC', Roboto, 'Helvetica Neue', sans-serif;
            background: #1a1410;
            color: #f0e6d8;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        .page {
            width: 100%;
            max-width: 560px;
            min-height: 700px;
            background: #2d231e;
            border-radius: 32px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8), inset 0 1px 0 rgba(255, 215, 170, 0.08);
            padding: 28px 24px 32px;
            border: 1px solid #4d3a30;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        /* ===== 标题 ===== */
        .header-icon {
            text-align: center;
            font-size: 42px;
            margin-bottom: 6px;
            letter-spacing: 8px;
            filter: drop-shadow(0 4px 20px rgba(184, 135, 94, 0.15));
            opacity: 0;
            animation: fadeIn 0.8s ease 0.4s forwards;
        }

        .title {
            font-size: 26px;
            font-weight: 700;
            letter-spacing: 4px;
            color: #f5dcc8;
            text-shadow: 0 2px 12px rgba(0, 0, 0, 0.5);
            text-align: center;
            padding-bottom: 12px;
            border-bottom: 2px solid #5f4336;
            margin-bottom: 16px;
            opacity: 0;
            animation: fadeIn 1s ease 0.4s forwards;
        }

        .title .sub {
            display: block;
            font-size: 14px;
            font-weight: 400;
            color: #b0907a;
            letter-spacing: 2px;
            margin-top: 4px;
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
            }
        }

        /* ===== 卡片通用 ===== */
        .card {
            background: rgba(40, 28, 22, 0.7);
            border-radius: 18px;
            padding: 16px 20px;
            margin-bottom: 14px;
            backdrop-filter: blur(4px);
            border-left: 4px solid #b8875e;
        }

        .card .label {
            font-size: 13px;
            font-weight: 600;
            color: #b8875e;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 6px;
        }

        /* ===== 开发者卡片：滑入 + 持续发光（无闪烁） ===== */
        #devCard {
            border-left-color: #b8875e;
            opacity: 0;
            transform: translateY(60px);
            box-shadow: 0 0 25px rgba(184, 135, 94, 0.4),
                0 0 50px rgba(184, 135, 94, 0.2),
                inset 0 1px 0 rgba(255, 215, 170, 0.08);
            animation: devSlideUp 0.7s cubic-bezier(0.22, 1, 0.36, 1) 0.15s forwards;
        }

        @keyframes devSlideUp {
            0% {
                opacity: 0;
                transform: translateY(60px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ===== 留言卡片：滑入 + 持续发光（无闪烁） ===== */
        #msgCard {
            border-left-color: #8a6a55;
            opacity: 0;
            transform: translateY(60px);
            box-shadow: 0 0 25px rgba(184, 135, 94, 0.4),
                0 0 50px rgba(184, 135, 94, 0.2),
                inset 0 1px 0 rgba(255, 215, 170, 0.08);
            animation: msgSlideUp 0.7s cubic-bezier(0.22, 1, 0.36, 1) 0.45s forwards;
        }

        @keyframes msgSlideUp {
            0% {
                opacity: 0;
                transform: translateY(60px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ===== 留言板内容（无自动滚动，保留手动滚动） ===== */
        .msg-board {
            max-height: 260px;
            overflow-y: auto;
            padding-right: 4px;
            margin-top: 2px;
            scroll-behavior: smooth;
        }

        .msg-board::-webkit-scrollbar {
            width: 4px;
        }

        .msg-board::-webkit-scrollbar-track {
            background: rgba(40, 28, 22, 0.5);
            border-radius: 8px;
        }

        .msg-board::-webkit-scrollbar-thumb {
            background: #b8875e;
            border-radius: 8px;
        }

        .msg-item {
            padding: 10px 8px 10px 12px;
            border-bottom: 1px solid rgba(255, 215, 170, 0.06);
            border-radius: 4px;
        }

        .msg-item:last-child {
            border-bottom: none;
        }

        .msg-id {
            color: #b8875e;
            font-weight: 600;
            font-size: 14px;
            letter-spacing: 0.5px;
        }

        .msg-text {
            font-size: 14px;
            line-height: 1.7;
            color: #e8d9cd;
            margin-top: 2px;
            padding-left: 4px;
        }

        .msg-empty {
            text-align: center;
            color: #7a6558;
            padding: 24px 0;
            font-size: 14px;
        }

        /* ===== 开发者内部样式 ===== */
        .credit-name {
            display: flex;
            flex-wrap: wrap;
            gap: 8px 16px;
            margin-top: 4px;
        }

        .credit-name .name {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(184, 135, 94, 0.12);
            border: 1px solid rgba(184, 135, 94, 0.25);
            border-radius: 40px;
            padding: 4px 18px 4px 14px;
            font-size: 15px;
            font-weight: 600;
            color: #fad5b0;
            letter-spacing: 1px;
        }

        .credit-name .name .emoji {
            font-size: 16px;
            font-weight: 400;
        }

        .credit-name .and {
            color: #7a6558;
            font-size: 14px;
            display: flex;
            align-items: center;
        }

        .dev-footer-text {
            margin-top: 8px;
            font-size: 13px;
            color: #b0907a;
            border-top: 1px solid rgba(255, 215, 170, 0.06);
            padding-top: 8px;
            line-height: 1.6;
        }

        /* ===== 底部按钮 ===== */
        .btn-start {
            display: block;
            width: 100%;
            padding: 10px 16px;
            background: #7a5a47;
            border: none;
            border-radius: 40px;
            color: #f5ede5;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.25s;
            box-shadow: 0 4px 0 #4d342b, 0 6px 18px rgba(0, 0, 0, 0.4);
            text-align: center;
            letter-spacing: 3px;
            margin-top: 8px;
            user-select: none;
            text-decoration: none;
            opacity: 0;
            animation: fadeIn 0.8s ease 1.8s forwards;
        }

        .btn-start:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 0 #4d342b, 0 10px 28px rgba(0, 0, 0, 0.5);
            background: #8d6a55;
        }

        .btn-start:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #4d342b;
        }

        .btn-start .arrow {
            display: inline-block;
            margin-left: 8px;
            transition: transform 0.2s;
        }

        .btn-start:hover .arrow {
            transform: translateX(4px);
        }

        /* ===== Footer ===== */
        .footer {
            margin-top: auto;
            padding-top: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            border-top: 1px solid #3d2c23;
            opacity: 0;
            animation: fadeIn 0.8s ease 2s forwards;
        }

        .footer .disclaimer {
            font-size: 11px;
            color: #7a6558;
            line-height: 1.6;
            text-align: center;
        }

        .footer .brand {
            text-align: center;
            font-size: 13px;
            color: #7a6558;
            letter-spacing: 2px;
            opacity: 0.7;
        }

        /* ===== 响应式 ===== */
        @media (max-width: 480px) {
            .page {
                padding: 20px 16px 24px;
                min-height: 620px;
                border-radius: 24px;
            }
            .title {
                font-size: 22px;
            }
            .msg-board {
                max-height: 200px;
            }
            .credit-name .name {
                font-size: 13px;
                padding: 3px 14px 3px 10px;
            }
            .btn-start {
                font-size: 14px;
                padding: 8px 14px;
                box-shadow: 0 3px 0 #4d342b, 0 6px 18px rgba(0, 0, 0, 0.4);
            }
            .btn-start:hover {
                transform: translateY(-1px);
                box-shadow: 0 4px 0 #4d342b, 0 8px 20px rgba(0, 0, 0, 0.5);
            }
            .btn-start:active {
                transform: translateY(3px);
                box-shadow: 0 1px 0 #4d342b;
            }
            /* 响应式下发光强度适当降低 */
            #devCard,
            #msgCard {
                box-shadow: 0 0 18px rgba(184, 135, 94, 0.35),
                    0 0 35px rgba(184, 135, 94, 0.15),
                    inset 0 1px 0 rgba(255, 215, 170, 0.08);
            }
        }

        @media (max-width: 380px) {
            .page {
                padding: 16px 12px 20px;
                min-height: 560px;
            }
            .title {
                font-size: 19px;
            }
            .card {
                padding: 12px 14px;
            }
            .msg-board {
                max-height: 160px;
            }
            .credit-name .name {
                font-size: 12px;
                padding: 2px 10px 2px 8px;
            }
            .btn-start {
                font-size: 13px;
                padding: 6px 12px;
                box-shadow: 0 2px 0 #4d342b, 0 4px 12px rgba(0, 0, 0, 0.4);
            }
            .btn-start:hover {
                transform: translateY(-1px);
                box-shadow: 0 3px 0 #4d342b, 0 6px 16px rgba(0, 0, 0, 0.5);
            }
            .btn-start:active {
                transform: translateY(2px);
                box-shadow: 0 0px 0 #4d342b;
            }
            #devCard,
            #msgCard {
                box-shadow: 0 0 12px rgba(184, 135, 94, 0.3),
                    0 0 25px rgba(184, 135, 94, 0.1),
                    inset 0 1px 0 rgba(255, 215, 170, 0.08);
            }
        }
    </style>

        // ===== 洗牌 =====
        function shuffleArray(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        // ===== 防XSS =====
        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // ===== 渲染留言 =====
        const board = document.getElementById('msgBoard');
        const shuffled = shuffleArray([...messages]);

        if (shuffled.length === 0) {
            board.innerHTML = '<div class="msg-empty">还没有留言，来写下第一句吧 ✨</div>';
        } else {
            let html = '';
            shuffled.forEach((msg) => {
                html += `
                            <div class="msg-item">
                                <div class="msg-id">${escapeHtml(msg.id)}</div>
                                <div class="msg-text">${escapeHtml(msg.text)}</div>
                            </div>
                        `;
            });
            board.innerHTML = html;
        }

    </script>

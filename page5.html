<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>乘风 · 应援场地</title>
    <style>
        /* ===== 全局风格（深色暖调复古梦幻） ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'PingFang SC', Roboto, 'Helvetica Neue', sans-serif;
            background: #1a1410;
            color: #f0e6d8;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .page {
            width: 100%;
            max-width: 560px;
            min-height: 700px;
            background: #2d231e;
            border-radius: 32px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8), inset 0 1px 0 rgba(255, 215, 170, 0.08);
            padding: 24px 20px 28px;
            border: 1px solid #4d3a30;
            display: flex;
            flex-direction: column;
            animation: fadeUp 0.5s ease-out;
            position: relative;
            overflow: hidden;
        }

        @keyframes fadeUp {
            0% {
                opacity: 0;
                transform: translateY(24px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 10px;
            border-bottom: 2px solid #5f4336;
            margin-bottom: 16px;
            flex-shrink: 0;
        }

        .page-header .id {
            font-size: 18px;
            font-weight: 700;
            color: #f5dcc8;
            letter-spacing: 2px;
        }

        .page-header .badge {
            font-size: 14px;
            font-weight: 400;
            background: #4d342b;
            padding: 2px 16px;
            border-radius: 40px;
            color: #c9b09d;
        }

        /* ===== 轮播图容器 ===== */
        .carousel-container {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #3a2b23;
            border-radius: 16px;
            border: 2px solid #5f4336;
            overflow: hidden;
            box-shadow: inset 0 0 30px rgba(0, 0, 0, 0.3);
            flex-shrink: 0;
            touch-action: pan-y;
        }

        .carousel-track {
            display: flex;
            width: 100%;
            height: 100%;
            transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            will-change: transform;
        }

        .carousel-slide {
            flex: 0 0 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #3a2b23;
        }

        .carousel-slide img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
            user-select: none;
            -webkit-user-drag: none;
        }

        /* 箭头 */
        .carousel-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 36px;
            height: 36px;
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(6px);
            border: 1px solid rgba(255, 215, 170, 0.2);
            border-radius: 50%;
            color: #f0e6d8;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            z-index: 5;
            user-select: none;
            touch-action: manipulation;
        }

        .carousel-arrow:hover {
            background: rgba(184, 135, 94, 0.6);
            border-color: #b8875e;
        }

        .carousel-arrow:active {
            transform: translateY(-50%) scale(0.92);
        }

        .carousel-arrow.prev {
            left: 10px;
        }
        .carousel-arrow.next {
            right: 10px;
        }

        /* 指示器 */
        .carousel-indicators {
            position: absolute;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            z-index: 5;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(4px);
            padding: 6px 14px;
            border-radius: 40px;
            border: 1px solid rgba(255, 215, 170, 0.1);
        }

        .carousel-indicators .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.25);
            cursor: pointer;
            transition: all 0.25s;
            border: 1px solid transparent;
            touch-action: manipulation;
        }

        .carousel-indicators .dot.active {
            background: #b8875e;
            border-color: #fad5b0;
            box-shadow: 0 0 12px rgba(184, 135, 94, 0.4);
            transform: scale(1.15);
        }

        .carousel-indicators .dot:hover {
            background: rgba(184, 135, 94, 0.6);
        }

        /* ===== 按钮区域 ===== */
        .action-bar {
            display: flex;
            gap: 12px;
            margin: 14px 0 12px;
            flex-shrink: 0;
            flex-wrap: wrap;
        }

        .action-bar .btn {
            flex: 1;
            min-width: 100px;
            padding: 12px 16px;
            background: #4d3a30;
            border: none;
            border-radius: 40px;
            color: #f5ede5;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 0 #2f221b, 0 6px 16px rgba(0, 0, 0, 0.3);
            user-select: none;
            touch-action: manipulation;
            text-align: center;
            letter-spacing: 0.5px;
        }

        .action-bar .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 0 #2f221b, 0 10px 24px rgba(0, 0, 0, 0.4);
            background: #5f483c;
        }

        .action-bar .btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #2f221b;
        }

        .action-bar .btn.active {
            background: #b8875e;
            box-shadow: 0 4px 0 #7a5a3d;
            color: #1f1612;
        }

        .action-bar .btn.active:hover {
            background: #cf9f74;
        }

        .action-bar .btn-back-action {
            background: #3d2c23;
            box-shadow: 0 4px 0 #221a16;
            font-size: 13px;
            padding: 12px 12px;
            flex: 0.5;
        }

        .action-bar .btn-back-action:hover {
            background: #4d3a30;
        }

        /* ===== 动态内容区域 ===== */
        .content-area {
            flex: 1;
            min-height: 180px;
            background: rgba(40, 28, 22, 0.5);
            border-radius: 16px;
            border: 1px solid #3d2c23;
            padding: 16px 18px;
            margin-top: 4px;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .content-area .empty-hint {
            color: #7a6558;
            font-size: 14px;
            text-align: center;
            padding: 28px 0;
            letter-spacing: 1px;
        }

        .content-area .content-panel {
            display: none;
            animation: fadeContent 0.35s ease-out;
        }

        .content-area .content-panel.active {
            display: block;
        }

        @keyframes fadeContent {
            0% {
                opacity: 0;
                transform: translateY(12px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ===== 留言板 ===== */
        .word-cloud-wrapper {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            overflow: hidden;
            background: #2d1f1a;
        }

        .word-cloud-wrapper img {
            width: 100%;
            height: auto;
            max-height: 320px;
            object-fit: contain;
            display: block;
            border-radius: 8px;
        }

        /* ===== 餐车 ===== */
        .food-truck-story {
            font-size: 15px;
            line-height: 1.8;
            color: #e8d9cd;
            margin-bottom: 14px;
            padding: 6px 2px;
        }

        .food-truck-story .highlight {
            color: #fad5b0;
            font-weight: 600;
        }

        .food-truck-story .highlight-emoji {
            font-size: 20px;
        }

        /* 水果谜题 */
        .math-section {
            background: #2d1f1a;
            border-radius: 16px;
            padding: 16px 14px;
            margin-top: 6px;
            border: 1px solid #4d3a30;
        }

        .math-section .question-text {
            font-size: 16px;
            color: #f0e6d8;
            margin-bottom: 12px;
            line-height: 1.7;
            font-weight: 400;
        }

        .math-section .question-text .fruit-big {
            font-size: 28px;
            display: inline-block;
            margin: 0 2px;
            vertical-align: middle;
        }

        .math-section .question-text .fruit-row {
            text-align: center;
            font-size: 22px;
            letter-spacing: 8px;
            padding: 6px 0 2px 0;
            color: #fad5b0;
        }

        .math-section .question-text .hint-line {
            display: block;
            font-size: 14px;
            color: #b0907a;
            margin-top: 6px;
            font-style: italic;
            text-align: center;
        }

        .math-section .question-text .math {
            color: #fad5b0;
            font-weight: 700;
            font-size: 18px;
            background: rgba(0, 0, 0, 0.3);
            padding: 2px 14px;
            border-radius: 12px;
            display: inline-block;
            letter-spacing: 1px;
        }

        .math-input-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 6px;
        }

        .math-input-group input {
            flex: 1;
            min-width: 120px;
            max-width: 180px;
            padding: 12px 18px;
            border: 2px solid #5f4336;
            border-radius: 40px;
            background: #1f1612;
            color: #f0e6d8;
            font-size: 18px;
            font-weight: 600;
            text-align: center;
            font-family: 'Courier New', monospace;
            outline: none;
            transition: border 0.2s;
            letter-spacing: 4px;
        }

        .math-input-group input:focus {
            border-color: #b8875e;
            box-shadow: 0 0 0 3px rgba(184, 135, 94, 0.2);
        }

        .math-input-group input::placeholder {
            color: #5f4a3a;
            font-size: 14px;
            font-weight: 400;
            letter-spacing: 1px;
        }

        .math-input-group .btn-submit {
            padding: 12px 28px;
            background: #7a5a47;
            border: none;
            border-radius: 40px;
            color: #f5ede5;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 0 #4d342b, 0 6px 16px rgba(0, 0, 0, 0.3);
            user-select: none;
            touch-action: manipulation;
            flex-shrink: 0;
        }

        .math-input-group .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 0 #4d342b, 0 10px 24px rgba(0, 0, 0, 0.4);
            background: #8d6a55;
        }

        .math-input-group .btn-submit:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #4d342b;
        }

        .math-feedback {
            text-align: center;
            font-size: 15px;
            margin-top: 12px;
            padding: 10px 14px;
            border-radius: 12px;
            min-height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            gap: 8px;
            line-height: 1.6;
        }

        .math-feedback.success {
            color: #7bcfa6;
            background: rgba(123, 207, 166, 0.1);
            border: 1px solid #7bcfa6;
        }

        .math-feedback.error {
            color: #e08a7a;
            background: rgba(224, 138, 122, 0.1);
            border: 1px solid #e08a7a;
        }

        .math-feedback .btn-next {
            display: inline-block;
            padding: 8px 24px;
            background: #b8875e;
            border: none;
            border-radius: 40px;
            color: #1f1612;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 0 #7a5a3d;
            user-select: none;
            touch-action: manipulation;
            margin-left: 4px;
            text-decoration: none;
            letter-spacing: 0.5px;
        }

        .math-feedback .btn-next:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 0 #7a5a3d;
            background: #cf9f74;
        }

        .math-feedback .btn-next:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #7a5a3d;
        }

        /* ===== 返回首页 ===== */
        .btn-back-home {
            display: inline-block;
            padding: 8px 20px;
            background: #4d342b;
            border: none;
            border-radius: 40px;
            color: #c9b09d;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 3px 0 #2f221b;
            text-decoration: none;
            text-align: center;
            margin-top: 8px;
            flex-shrink: 0;
            user-select: none;
            touch-action: manipulation;
        }

        .btn-back-home:hover {
            background: #5f483c;
            transform: translateY(-2px);
            box-shadow: 0 5px 0 #2f221b;
        }

        .btn-back-home:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #2f221b;
        }

        /* ===== Footer ===== */
        .footer {
            margin-top: auto;
            padding-top: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            color: #7a6558;
            border-top: 1px solid #3d2c23;
            flex-shrink: 0;
            flex-wrap: wrap;
            gap: 4px;
        }

        .footer .page-num {
            background: #2d1f1a;
            padding: 2px 16px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 500;
            color: #b0907a;
        }

        .footer .brand {
            letter-spacing: 1px;
            opacity: 0.7;
        }

        /* ===== Toast ===== */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #2d1f1a;
            padding: 12px 28px;
            border-radius: 40px;
            border: 1px solid #b8875e;
            color: #f5ede5;
            font-size: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
            z-index: 999;
            opacity: 0;
            transition: opacity 0.3s, transform 0.3s;
            pointer-events: none;
            max-width: 90%;
            text-align: center;
            backdrop-filter: blur(8px);
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* ===== 图片模态框 ===== */
        .image-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(6px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            cursor: pointer;
            padding: 20px;
            animation: fadeIn 0.3s ease-out;
        }

        .image-modal.active {
            display: flex;
        }

        @keyframes fadeIn {
            0% {
                opacity: 0;
            }
            100% {
                opacity: 1;
            }
        }

        .image-modal img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
            border: 2px solid #b8875e;
            object-fit: contain;
            cursor: default;
            transition: transform 0.2s;
        }

        .image-modal img:hover {
            transform: scale(1.02);
        }

        /* ===== 响应式 ===== */
        @media (max-width: 480px) {
            .page {
                padding: 18px 14px 22px;
                min-height: 600px;
                border-radius: 24px;
            }

            .page-header .id {
                font-size: 16px;
            }

            .carousel-container {
                aspect-ratio: 16 / 10;
            }

            .carousel-arrow {
                width: 30px;
                height: 30px;
                font-size: 14px;
            }

            .carousel-arrow.prev {
                left: 6px;
            }
            .carousel-arrow.next {
                right: 6px;
            }

            .carousel-indicators {
                padding: 4px 12px;
                gap: 6px;
                bottom: 8px;
            }

            .carousel-indicators .dot {
                width: 8px;
                height: 8px;
            }

            .action-bar .btn {
                font-size: 14px;
                padding: 10px 12px;
                min-width: 80px;
            }

            .content-area {
                min-height: 150px;
                padding: 12px 14px;
            }

            .math-section .question-text {
                font-size: 14px;
            }

            .math-section .question-text .fruit-big {
                font-size: 24px;
            }

            .math-section .question-text .fruit-row {
                font-size: 20px;
                letter-spacing: 6px;
            }

            .math-input-group input {
                font-size: 16px;
                padding: 10px 14px;
                min-width: 100px;
                max-width: 150px;
            }

            .math-input-group .btn-submit {
                padding: 10px 20px;
                font-size: 14px;
            }

            .food-truck-story {
                font-size: 14px;
            }

            .word-cloud-wrapper img {
                max-height: 220px;
            }

            .math-feedback {
                font-size: 14px;
                padding: 8px 12px;
            }
        }

        @media (max-width: 380px) {
            .page {
                padding: 14px 10px 18px;
                min-height: 540px;
            }

            .carousel-container {
                aspect-ratio: 16 / 11;
            }

            .carousel-arrow {
                width: 26px;
                height: 26px;
                font-size: 12px;
            }

            .action-bar .btn {
                font-size: 12px;
                padding: 8px 8px;
                min-width: 60px;
            }

            .content-area {
                min-height: 130px;
                padding: 10px 10px;
            }

            .math-section .question-text {
                font-size: 13px;
            }

            .math-section .question-text .fruit-big {
                font-size: 20px;
            }

            .math-section .question-text .fruit-row {
                font-size: 17px;
                letter-spacing: 4px;
            }

            .math-input-group input {
                font-size: 14px;
                padding: 8px 10px;
                min-width: 80px;
                max-width: 120px;
            }

            .math-input-group .btn-submit {
                padding: 8px 14px;
                font-size: 13px;
            }

            .footer {
                font-size: 11px;
            }
        }

        /* ===== 工具 ===== */
        .text-center {
            text-align: center;
        }
        .mt-4 {
            margin-top: 4px;
        }
        .mt-8 {
            margin-top: 8px;
        }
        .mb-8 {
            margin-bottom: 8px;
        }
        .flex-center {
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .gap-8 {
            gap: 8px;
        }
        .gap-12 {
            gap: 12px;
        }
        .w-full {
            width: 100%;
        }

        /* ===== 狸猫签名小装饰 ===== */
        .tanuki-sign {
            display: inline-block;
            font-size: 13px;
            color: #b8875e;
            background: rgba(184, 135, 94, 0.12);
            padding: 2px 14px;
            border-radius: 20px;
            border: 1px solid rgba(184, 135, 94, 0.2);
            margin-top: 6px;
        }
    </style>
</head>
<body>

    <!-- Toast -->
    <div id="toast" class="toast"></div>

    <!-- 图片模态框 -->
    <div class="image-modal" id="imageModal" onclick="closeModal()">
        <img id="modalImage" src="" alt="应援现场" onclick="event.stopPropagation();">
    </div>

    <!-- ===== 主页面 ===== -->
    <div class="page" id="page-support">

        <!-- Header -->
        <div class="page-header">
            <span class="id">✨ 应援场地</span>
            <span class="badge">5 / 7</span>
        </div>

        <!-- 轮播图 -->
        <div class="carousel-container" id="carousel">
            <div class="carousel-track" id="carouselTrack">
                <!-- JS 动态生成 -->
            </div>

            <!-- 左右箭头 -->
            <button class="carousel-arrow prev" id="carouselPrev" aria-label="上一张">◀</button>
            <button class="carousel-arrow next" id="carouselNext" aria-label="下一张">▶</button>

            <!-- 指示器 -->
            <div class="carousel-indicators" id="carouselIndicators">
                <!-- JS 动态生成 -->
            </div>
        </div>

        <!-- 操作按钮 -->
        <div class="action-bar" id="actionBar">
            <button class="btn" id="btnWordCloud" onclick="showWordCloud()">🌸 花墙留言板</button>
            <button class="btn" id="btnFoodTruck" onclick="showFoodTruck()">🚚 餐车</button>
        </div>

        <!-- 动态内容区域 -->
        <div class="content-area" id="contentArea">
            <!-- 空状态（默认） -->
            <div class="empty-hint" id="emptyHint">👆 点击上方按钮探索应援场地</div>

            <!-- 留言板面板 -->
            <div class="content-panel" id="panelWordCloud">
                <div class="word-cloud-wrapper">
                    <img src="word_cloud1.png" alt="花墙留言板" id="wordCloudImg" onclick="openModal(this.src)">
                </div>
                <div style="text-align:center;font-size:13px;color:#7a6558;margin-top:8px;">
                    💬 粉丝们写满了祝福
                </div>
            </div>

            <!-- 餐车面板 -->
            <div class="content-panel" id="panelFoodTruck">
                <div class="food-truck-story">
                    一辆 <span class="highlight">狸克管理的餐车</span> 停在旁边，飘来蛋挞的香气……<br>
                    和狸克 <span class="highlight">交换物品</span> 吧！
                </div>

                <div class="math-section">
                    <div class="question-text">
                        <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;justify-content:center;margin-bottom:8px;">
                            <span style="font-size:20px;">🧮</span>
                            <span style="font-weight:600;color:#fad5b0;">狸克的水果谜题</span>
                            <span class="tanuki-sign">🦝 狸克商店</span>
                        </div>

                        <p style="font-size:15px;color:#e0d2c4;line-height:1.8;margin:4px 0 10px 0;">
                            "欢迎光临狸克的商店！我是店主狸克狸~<br>
                            今天有一道特别的水果谜题狸~<br>
                            答对了有 <span class="highlight">巧克力蛋挞</span> 作为奖励狸！"
                        </p>

                        <div style="background:rgba(0,0,0,0.25);border-radius:12px;padding:12px 10px;margin:6px 0 10px 0;border:1px solid #3d2c23;">
                            <div style="font-size:25px;color:#d4c0b0;line-height:1.9;">
                                🍑 是 1~9 中 <span style="color:#fad5b0;font-weight:600;">最小</span> 的数字<br>
                                🍎 是 1~9 中 <span style="color:#fad5b0;font-weight:600;">最大</span> 的数字<br>
                                🍋 = 🍑 + 6<br>
                                🥝 比 🍋 小 1<br>
                                <span style="color:#b0907a;font-size:13px;">四个数字都不同狸！</span>
                            </div>
                            <div class="fruit-row">
                                <span class="fruit-big">🍑</span>
                                <span class="fruit-big">🍎</span>
                                <span class="fruit-big">🍋</span>
                                <span class="fruit-big">🥝</span>
                            </div>
                            <div class="hint-line">
                                👆 按这个顺序组成四位密码
                            </div>
                        </div>

                        <div style="text-align:center;font-size:14px;color:#b0907a;padding:4px 0 2px 0;">
                            "算出来就告诉我密码吧狸！"
                        </div>
                    </div>

                    <div class="math-input-group">
                        <input type="text" id="mathInput" placeholder="四位密码" maxlength="4" autocomplete="off" inputmode="numeric">
                        <button class="btn-submit" id="mathSubmitBtn" onclick="submitMath()">➜ 验证</button>
                    </div>
                    <div class="math-feedback" id="mathFeedback"></div>
                </div>
            </div>
        </div>

        <!-- 返回首页 -->
        <div style="margin-top: 10px; text-align: center; flex-shrink: 0;">
            <a href="index.html" class="btn-back-home">⬅ 还是回摄影棚吧</a>
        </div>

        <!-- Footer -->
        <div class="footer">
            <span class="page-num">📍 应援场地 · 5/7</span>
            <span class="brand">✦ 乘风 ✦</span>
        </div>

    </div>

    <script>
        // ================================================================
        //  配置
        // ================================================================
        // 轮播图图片数组
        const SUPPORT_IMAGES = [
            'support0.jpg',
            'support1.jpg',
            'support2.jpg',
            'support3.jpg',
            'support4.jpg',
            'support5.jpg',
            'support6.jpg',
            'support7.jpg',
            'support8.jpg',
            'support10.jpg',
            'support9.jpg'
        ];

        // 水果谜题正确答案（四位密码）
        const MATH_ANSWER = '1976';

        // ================================================================
        //  Toast
        // ================================================================
        let toastTimer = null;

        function showToast(msg, duration = 2200) {
            const el = document.getElementById('toast');
            el.textContent = msg;
            el.classList.add('show');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => {
                el.classList.remove('show');
            }, duration);
        }

        // ================================================================
        //  图片模态框
        // ================================================================
        function openModal(src) {
            const modal = document.getElementById('imageModal');
            const img = document.getElementById('modalImage');
            img.src = src;
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            const modal = document.getElementById('imageModal');
            modal.classList.remove('active');
            document.body.style.overflow = '';
        }

        document.getElementById('imageModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });

        // ================================================================
        //  轮播图
        // ================================================================
        let currentSlide = 0;
        let totalSlides = SUPPORT_IMAGES.length;
        let touchStartX = 0;
        let touchStartY = 0;
        let isDragging = false;
        let autoPlayTimer = null;

        function initCarousel() {
            const track = document.getElementById('carouselTrack');
            const indicators = document.getElementById('carouselIndicators');

            track.innerHTML = '';
            indicators.innerHTML = '';

            SUPPORT_IMAGES.forEach((src, idx) => {
                const slide = document.createElement('div');
                slide.className = 'carousel-slide';
                const img = document.createElement('img');
                img.src = src;
                img.alt = '应援现场 ' + (idx + 1);
                img.loading = 'lazy';
                img.onclick = function(e) {
                    e.stopPropagation();
                    openModal(this.src);
                };
                slide.appendChild(img);
                track.appendChild(slide);

                const dot = document.createElement('span');
                dot.className = 'dot' + (idx === 0 ? ' active' : '');
                dot.dataset.index = idx;
                dot.addEventListener('click', function(e) {
                    e.stopPropagation();
                    goToSlide(parseInt(this.dataset.index));
                });
                indicators.appendChild(dot);
            });

            totalSlides = SUPPORT_IMAGES.length;
            updateCarousel();

            document.getElementById('carouselPrev').addEventListener('click', function(e) {
                e.stopPropagation();
                prevSlide();
                resetAutoPlay();
            });
            document.getElementById('carouselNext').addEventListener('click', function(e) {
                e.stopPropagation();
                nextSlide();
                resetAutoPlay();
            });

            const container = document.getElementById('carousel');
            container.addEventListener('touchstart', handleTouchStart, { passive: true });
            container.addEventListener('touchmove', handleTouchMove, { passive: true });
            container.addEventListener('touchend', handleTouchEnd, { passive: true });

            container.addEventListener('mousedown', handleMouseDown);
            container.addEventListener('mousemove', handleMouseMove);
            container.addEventListener('mouseup', handleMouseUp);
            container.addEventListener('mouseleave', handleMouseUp);

            startAutoPlay();

            window.addEventListener('resize', function() {
                updateCarousel();
            });
        }

        function updateCarousel() {
            const track = document.getElementById('carouselTrack');
            track.style.transform = 'translateX(-' + (currentSlide * 100) + '%)';

            const dots = document.querySelectorAll('#carouselIndicators .dot');
            dots.forEach((dot, idx) => {
                dot.classList.toggle('active', idx === currentSlide);
            });
        }

        function goToSlide(index) {
            if (index < 0) index = totalSlides - 1;
            if (index >= totalSlides) index = 0;
            currentSlide = index;
            updateCarousel();
        }

        function prevSlide() {
            goToSlide(currentSlide - 1);
        }

        function nextSlide() {
            goToSlide(currentSlide + 1);
        }

        function handleTouchStart(e) {
            const touch = e.touches[0];
            touchStartX = touch.clientX;
            touchStartY = touch.clientY;
            isDragging = true;
            stopAutoPlay();
        }

        function handleTouchMove(e) {
            if (!isDragging) return;
            const touch = e.touches[0];
            const deltaX = touch.clientX - touchStartX;
            const deltaY = touch.clientY - touchStartY;
            if (Math.abs(deltaX) > Math.abs(deltaY) && Math.abs(deltaX) > 10) {
                e.preventDefault();
            }
        }

        function handleTouchEnd(e) {
            if (!isDragging) return;
            isDragging = false;
            const touch = e.changedTouches[0];
            const deltaX = touch.clientX - touchStartX;
            const deltaY = touch.clientY - touchStartY;
            if (Math.abs(deltaX) > 30 && Math.abs(deltaX) > Math.abs(deltaY) * 1.2) {
                if (deltaX > 0) {
                    prevSlide();
                } else {
                    nextSlide();
                }
            }
            startAutoPlay();
        }

        let mouseDown = false;
        let mouseStartX = 0;
        let mouseStartY = 0;

        function handleMouseDown(e) {
            mouseDown = true;
            mouseStartX = e.clientX;
            mouseStartY = e.clientY;
            stopAutoPlay();
        }

        function handleMouseMove(e) {
            if (!mouseDown) return;
            const deltaX = e.clientX - mouseStartX;
            const deltaY = e.clientY - mouseStartY;
            if (Math.abs(deltaX) > 20 && Math.abs(deltaX) > Math.abs(deltaY) * 1.2) {
                mouseDown = false;
                if (deltaX > 0) {
                    prevSlide();
                } else {
                    nextSlide();
                }
                startAutoPlay();
            }
        }

        function handleMouseUp(e) {
            if (mouseDown) {
                mouseDown = false;
                startAutoPlay();
            }
        }

        function startAutoPlay() {
            stopAutoPlay();
            autoPlayTimer = setInterval(() => {
                nextSlide();
            }, 4500);
        }

        function stopAutoPlay() {
            if (autoPlayTimer) {
                clearInterval(autoPlayTimer);
                autoPlayTimer = null;
            }
        }

        function resetAutoPlay() {
            stopAutoPlay();
            startAutoPlay();
        }

        // ================================================================
        //  内容切换
        // ================================================================
        let currentPanel = 'empty';

        function showPanel(panelId) {
            document.querySelectorAll('.content-panel').forEach(p => p.classList.remove('active'));
            document.getElementById('emptyHint').style.display = 'none';

            const panel = document.getElementById(panelId);
            if (panel) {
                panel.classList.add('active');
            }

            const btnWC = document.getElementById('btnWordCloud');
            const btnFT = document.getElementById('btnFoodTruck');
            btnWC.classList.remove('active');
            btnFT.classList.remove('active');

            if (panelId === 'panelWordCloud') {
                btnWC.classList.add('active');
                currentPanel = 'wordcloud';
            } else if (panelId === 'panelFoodTruck') {
                btnFT.classList.add('active');
                currentPanel = 'foodtruck';

                // 处理餐车面板状态：如果已解锁，保持成功状态；否则清空
                const fb = document.getElementById('mathFeedback');
                const input = document.getElementById('mathInput');
                const submitBtn = document.getElementById('mathSubmitBtn');
                if (mathSolved) {
                    // 恢复成功状态
                    fb.className = 'math-feedback success';
                    fb.innerHTML = `
                        🎉 太棒啦！你成功解开了水果谜题狸！<br>
                        "这是给你的巧克力蛋挞，请好好享用吧狸！" 🍫<br>
                        <span style="font-size:13px;color:#b0907a;">看起来周围也没有什么人，还是回一号训练室继续玩会儿游戏吧</span>
                        <br><br>
                        <button class="btn-next" onclick="goToPage6()">🏃 返回训练室 →</button>
                    `;
                    input.disabled = true;
                    submitBtn.disabled = true;
                    input.value = '';
                } else {
                    fb.className = 'math-feedback';
                    fb.innerHTML = '';
                    input.disabled = false;
                    submitBtn.disabled = false;
                    input.value = '';
                }
            } else {
                currentPanel = 'empty';
                document.getElementById('emptyHint').style.display = 'block';
            }
        }

        function showWordCloud() {
            showPanel('panelWordCloud');
            showToast('🌸 花墙留言板');
        }

        function showFoodTruck() {
            showPanel('panelFoodTruck');
            showToast('🚚 狸克餐车');
        }

        // ================================================================
        //  水果谜题验证（动森狸猫风格）
        // ================================================================
        let mathSolved = false;

        function submitMath() {
            if (mathSolved) {
                showToast('🍫 已经兑换过蛋挞啦狸！');
                return;
            }

            const input = document.getElementById('mathInput');
            const val = input.value.trim();
            const fb = document.getElementById('mathFeedback');

            if (!val || val.length !== 4 || !/^\d{4}$/.test(val)) {
                fb.className = 'math-feedback error';
                fb.innerHTML = '❌ 哎呀，要输入四位数字密码呢！请再试试看吧狸～';
                showToast('🔢 请输入四位数字');
                return;
            }

            if (val === MATH_ANSWER) {
                mathSolved = true;
                fb.className = 'math-feedback success';
                fb.innerHTML = `
                    🎉 太棒啦！你成功解开了水果谜题狸！<br>
                    "这是给你的巧克力蛋挞，请好好享用吧狸！" 🍫<br>
                    <span style="font-size:13px;color:#b0907a;">看起来周围也没有什么人，还是回一号训练室继续玩会儿游戏吧</span>
                    <br><br>
                    <button class="btn-next" onclick="goToPage6()">🏃 返回训练室 →</button>
                `;
                showToast('🍫 兑换成功！蛋挞到手！');
                input.disabled = true;
                document.getElementById('mathSubmitBtn').disabled = true;
            } else {
                fb.className = 'math-feedback error';
                fb.innerHTML = '❌ 唔…密码不对呢，再想想看吧狸！<br><span style="font-size:13px;color:#b0907a;">💡 提示：🍑 是最小的数字（1），🍎 是最大的数字（9）哦！</span>';
                showToast('❌ 密码不对，再算算看吧狸～');
                input.value = '';
                input.focus();
                input.style.borderColor = '#c07a6b';
                setTimeout(() => {
                    input.style.borderColor = '';
                }, 600);
            }
        }

        function goToPage6() {
            showToast('🏃 前往一号训练室…');
            setTimeout(() => {
                window.location.href = 'page6.html';
            }, 400);
        }

        // ================================================================
        //  回车提交 & 输入限制
        // ================================================================
        document.addEventListener('DOMContentLoaded', function() {
            initCarousel();

            document.getElementById('mathInput').addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    submitMath();
                }
            });

            document.getElementById('mathInput').addEventListener('input', function(e) {
                this.value = this.value.replace(/\D/g, '').slice(0, 4);
            });

            document.getElementById('contentArea').addEventListener('click', function(e) {
                const img = e.target.closest('.word-cloud-wrapper img');
                if (img) {
                    openModal(img.src);
                }
            });

            document.getElementById('carouselTrack').addEventListener('click', function(e) {
                const img = e.target.closest('.carousel-slide img');
                if (img) {
                    openModal(img.src);
                }
            });

            showPanel('empty');
        });

        // ================================================================
        //  键盘快捷键：Enter 提交
        // ================================================================
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                const active = document.activeElement;
                if (active && active.id === 'mathInput') {
                    e.preventDefault();
                    submitMath();
                }
            }
        });

        // ================================================================
        //  暴露全局函数（用于内联 onclick）
        // ================================================================
        window.showWordCloud = showWordCloud;
        window.showFoodTruck = showFoodTruck;
        window.submitMath = submitMath;
        window.goToPage6 = goToPage6;
        window.openModal = openModal;
        window.closeModal = closeModal;
    </script>

</body>
</html>
